<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuesta de Salud</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>Encuesta de Salud</h1>

    <form id="formulario">

      <label for="edad">
        Edad
      </label>

      <input
      type="number"
      id="edad"
      min="1"
      max="120"
      placeholder="Ingresa tu edad"
      required>

      <label for="peso">
        Peso (kg)
      </label>

      <input
      type="number"
      id="peso"
      min="20"
      max="300"
      placeholder="Ingresa tu peso"
      required>

      <label for="dolor">
        Nivel de dolor
      </label>

      <input
      type="range"
      id="dolor"
      min="0"
      max="10"
      value="5">

      <p id="valorDolor">
        
      </p>

      <label for="sangre">
        Tipo de sangre
      </label>

      <select id="sangre" required>
        <option value="">
          Selecciona una opción
        </option>

        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>
      </select>

      <button type="submit">
        Enviar Encuesta
      </button>

      <p id="mensaje"></p>

    </form>

  </div>

  <script src="script.js"></script>

</body>
</html>
